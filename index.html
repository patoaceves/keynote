<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keynotes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --navy:   #0d1b4b;
  --blue:   #1d5ce8;
  --light:  #f1f5fb;
  --border: rgba(13,27,75,0.09);
  --muted:  #64748b;
  --text:   #0d1b4b;
  --white:  #ffffff;
  --green:  #059669;
  --amber:  #d97706;
  --purple: #7c3aed;
  --teal:   #0891b2;
  --rose:   #e11d48;
  --FD: 'Barlow Condensed', sans-serif;
  --FM: 'IBM Plex Mono', monospace;
  --FB: 'Barlow', sans-serif;
}

html, body { min-height:100vh; background:#eef2f8; font-family:var(--FB); color:var(--text); }

body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(13,27,75,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13,27,75,0.025) 1px, transparent 1px);
  background-size:36px 36px; pointer-events:none;
}

header {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 40px; height:54px;
  display:flex; align-items:center; justify-content:space-between;
}
.h-left { display:flex; align-items:center; gap:12px; }
.h-title { font-family:var(--FD); font-weight:800; font-size:18px; text-transform:uppercase; color:var(--navy); letter-spacing:.02em; }
.h-sub { font-family:var(--FM); font-size:9px; letter-spacing:.14em; color:var(--muted); opacity:.7; }
.h-right { font-family:var(--FM); font-size:10px; letter-spacing:.1em; color:var(--muted); opacity:.55; }

main { max-width:1000px; margin:0 auto; padding:44px 32px 80px; }

.page-header { margin-bottom:32px; }
.page-header h1 {
  font-family:var(--FD); font-weight:900; font-size:52px;
  line-height:.95; text-transform:uppercase; color:var(--navy);
}
.page-header h1 em { color:var(--blue); font-style:normal; }
.page-header p { font-family:var(--FM); font-size:10px; letter-spacing:.12em; color:var(--muted); margin-top:8px; }

/* ── GRID OF PROJECT FOLDERS ── */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:12px; }

.folder {
  background:var(--white); border:1px solid var(--border); border-radius:10px;
  padding:20px 22px 16px;
  text-decoration:none; color:inherit;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
  box-shadow:0 1px 5px rgba(13,27,75,.06);
  transition:transform .2s, box-shadow .2s, border-color .2s;
  animation:fadeUp .35s ease both;
}
.folder:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(13,27,75,.11); border-color:rgba(29,92,232,.22); }
.folder:hover .f-arrow { opacity:1; transform:translateX(0); }

.folder::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:10px 10px 0 0; background:var(--blue); }
.folder.green::before  { background:var(--green); }
.folder.amber::before  { background:var(--amber); }
.folder.purple::before { background:var(--purple); }
.folder.teal::before   { background:var(--teal); }
.folder.rose::before   { background:var(--rose); }
.folder.navy::before   { background:var(--navy); }

.f-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.f-icon { font-size:28px; line-height:1; }
.f-count { font-family:var(--FM); font-size:9px; letter-spacing:.1em; color:var(--muted); opacity:.65; }

.f-name { font-family:var(--FD); font-weight:800; font-size:24px; text-transform:uppercase; color:var(--navy); line-height:1.05; margin-bottom:5px; }
.f-desc { font-size:11.5px; color:var(--muted); line-height:1.5; margin-bottom:16px; }

.f-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); margin-top:auto; }
.f-tag {
  font-family:var(--FM); font-size:8.5px; letter-spacing:.12em;
  text-transform:uppercase; padding:3px 8px; border-radius:3px;
  background:rgba(29,92,232,.07); color:var(--blue);
}
.folder.green  .f-tag { background:rgba(5,150,105,.08);   color:var(--green); }
.folder.amber  .f-tag { background:rgba(217,119,6,.08);   color:var(--amber); }
.folder.purple .f-tag { background:rgba(124,58,237,.08);  color:var(--purple); }
.folder.teal   .f-tag { background:rgba(8,145,178,.08);   color:var(--teal); }
.folder.rose   .f-tag { background:rgba(225,29,72,.08);   color:var(--rose); }
.folder.navy   .f-tag { background:rgba(13,27,75,.07);    color:var(--navy); }

.f-arrow {
  width:26px; height:26px; border-radius:50%;
  background:var(--blue); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; opacity:0; transform:translateX(-6px);
  transition:opacity .2s, transform .2s;
}
.folder.green  .f-arrow { background:var(--green); }
.folder.amber  .f-arrow { background:var(--amber); }
.folder.purple .f-arrow { background:var(--purple); }
.folder.teal   .f-arrow { background:var(--teal); }
.folder.rose   .f-arrow { background:var(--rose); }
.folder.navy   .f-arrow { background:var(--navy); }

/* Staggered animations */
.folder:nth-child(1){animation-delay:.04s}
.folder:nth-child(2){animation-delay:.09s}
.folder:nth-child(3){animation-delay:.14s}
.folder:nth-child(4){animation-delay:.19s}
.folder:nth-child(5){animation-delay:.24s}
.folder:nth-child(6){animation-delay:.29s}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

footer {
  text-align:center; padding:28px;
  font-family:var(--FM); font-size:9px; letter-spacing:.1em;
  color:var(--muted); opacity:.4;
}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="h-title">Keynotes</div>
    <div class="h-sub">// MY DRIVE</div>
  </div>
  <div class="h-right" id="clock"></div>
</header>

<main>
  <div class="page-header">
    <h1>My <em>Keynotes</em></h1>
    <p>// SELECT A PROJECT</p>
  </div>

  <div class="grid">

    <!-- WRK MARKETING -->
    <a href="wrk/spa-dealers-division.html" class="folder">
      <div class="f-top">
        <div class="f-icon">📁</div>
        <div class="f-count">1 PRESENTATION</div>
      </div>
      <div class="f-name">WRK<br>Marketing</div>
      <div class="f-desc">Spa Dealers Division — operations overview, team, clients & CRM systems.</div>
      <div class="f-footer">
        <span class="f-tag">Active</span>
        <div class="f-arrow">→</div>
      </div>
    </a>

    <!-- Add more folders below as you go -->

  </div>
</main>

<footer>KEYNOTES &nbsp;·&nbsp; <span id="year"></span></footer>

<script>
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
tick(); setInterval(tick, 1000);
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
